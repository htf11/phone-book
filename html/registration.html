<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>my phone book - registration</title>
        <link href="../css/registration.css" rel="stylesheet" />

        <script
            type="module"
            src="https://esm.run/@material/web/all.js"
        ></script>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        />
    </head>
    <body>
        <header class="header">
            <div class="logo-group">
                <img
                    class="header-logo"
                    src="../sources/logo.png"
                    alt="Логотип приложения Телефонная книга"
                />
                <div class="heading">
                    <h1>ТЕЛЕФОННАЯ</h1>
                    <h1>КНИГА</h1>
                </div>
            </div>
        </header>

        <form class="form-container" onsubmit="event.preventDefault()">
            <div class="input-fields">
                <md-outlined-text-field
                    label="ЛОГИН"
                    name="username"
                    class="reg-input"
                ></md-outlined-text-field>
                <md-outlined-text-field
                    label="ПАРОЛЬ"
                    name="password"
                    type="password"
                    class="reg-input"
                ></md-outlined-text-field>
                <md-outlined-text-field
                    label="ПОВТОР ПАРОЛЯ"
                    name="password-confirm"
                    type="password"
                    class="reg-input"
                ></md-outlined-text-field>
            </div>

            <div class="button-create-cancel">
                <md-filled-button type="submit" class="btn-register"
                    >СОЗДАТЬ</md-filled-button
                >
                <md-outlined-button
                    type="button"
                    class="btn-back"
                    onclick="window.location.href = '../index.html'"
                >
                    НАЗАД
                </md-outlined-button>
            </div>
        </form>
    </body>
</html>
