<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>my phone book</title>
        <link href="../css/index.css" rel="stylesheet" />
        <script
            type="module"
            src="https://esm.run/@material/web/all.js"
        ></script>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        />
    </head>
    <body>
        <header class="header">
            <div class="logo-group">
                <img
                    class="header-logo"
                    src="../sources/logo.png"
                    alt="Логотип приложения Телефонная книга"
                />
                <div class="heading">
                    <h1>ТЕЛЕФОННАЯ</h1>
                    <h1>КНИГА</h1>
                </div>
            </div>
            <md-filled-button
                class="btn-logout"
                onclick="window.location.href = '../index.html'"
                >ВЫХОД</md-filled-button
            >
        </header>

        <div class="toolbar">
            <md-filled-button
                class="add"
                onclick="window.location.href = 'add-record.html'"
            >
                ДОБАВИТЬ
            </md-filled-button>
            <form class="search" onsubmit="event.preventDefault()">
                <md-outlined-text-field
                    label="введите имя"
                    type="search"
                    class="search-input"
                >
                </md-outlined-text-field>
                <md-filled-button type="submit" class="search-btn">
                    ПОИСК
                </md-filled-button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ИМЯ</th>
                    <th>ТЕЛЕФОН</th>
                    <th>КОМНАТА</th>
                    <th>E-MAIL</th>
                </tr>
            </thead>
            <tbody class="contacts-list"></tbody>
        </table>
        <script src="../js/index.js"></script>
    </body>
</html>
