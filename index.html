<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my phone book</title>
    <!-- Подключаем скомпилированный CSS-файл -->
    <link href="css/index.css" rel="stylesheet">
    
    <!-- Подключаем библиотеки Google Material 3 -->
    <script type="module" src="https://esm.run/@material/web/all.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body>
    <header class="header">
         <div class="logo-group">
            <img class="header-logo"
            src="../sources/logo.png"
            alt="Логотип приложения Телефонная книга">
            <div class="heading">
                <h1>ТЕЛЕФОННАЯ</h1>
                <h1>КНИГА</h1>
            </div>
        </div>
    </header>
    
    <form class="auth-container" onsubmit="event.preventDefault();">
            <!-- Умные инпуты Material 3 -->
            <div class="login-password">
                <md-outlined-text-field 
                    label="ЛОГИН" 
                    name="username" 
                    class="auth-input">
                </md-outlined-text-field>
                
                <md-outlined-text-field 
                    label="ПАРОЛЬ" 
                    type="password" 
                    name="password" 
                    class="auth-input">
                </md-outlined-text-field>
            </div>
            
            <!-- Кнопки управления -->
            <div class="button-input-registration">
                <md-filled-button type="submit" class="btn-login">ВХОД</md-filled-button>
                <md-outlined-button type="button" class="btn-reg" onclick="window.location.href='html/registration.html'">
                    РЕГИСТРАЦИЯ
                </md-outlined-button>
            </div> 
    </form>
</body>
</html>
